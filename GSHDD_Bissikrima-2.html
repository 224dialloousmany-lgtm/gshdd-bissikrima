<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8"/>

<meta name="apple-mobile-web-app-title" content="GSHDD"/>
<title>G.S.H.D.D. Bissikrima</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@600;700&family=DM+Sans:wght@300;400;500;600;700&display=swap');
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html,body{height:100%;background:#080d15;font-family:'DM Sans',system-ui,sans-serif;color:#e2e8f0;overflow:hidden}
#app{height:100vh;display:flex;flex-direction:column}
::-webkit-scrollbar{width:4px}::-webkit-scrollbar-thumb{background:#1e2d45;border-radius:2px}
input,select,button,textarea{font-family:inherit}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2ea05a!important;box-shadow:0 0 0 3px rgba(46,160,90,.15)!important}
.btn{display:inline-flex;align-items:center;gap:6px;padding:9px 16px;border-radius:9px;font-size:.84rem;font-weight:600;cursor:pointer;border:none;transition:all .15s}
.btn-primary{background:#1a6b3c;color:#fff}.btn-primary:active{background:#145c32}
.btn-ghost{background:none;color:#94a3b8;border:1.5px solid #243048!important}
.btn-danger{background:rgba(239,68,68,.12);color:#f87171}
.btn-warn{background:rgba(251,146,60,.12);color:#fb923c}
.btn-full{width:100%;justify-content:center}
.card{background:#0f1623;border:1px solid #1e2d45;border-radius:16px;padding:1.25rem}
.tbl{width:100%;border-collapse:collapse}
.tbl th{text-align:left;padding:9px 10px;font-size:.7rem;font-weight:700;color:#64748b;text-transform:uppercase;letter-spacing:.06em;border-bottom:1px solid #1e2d45}
.tbl td{padding:10px 10px;font-size:.84rem;color:#cbd5e1;border-bottom:1px solid #131d2e}
.tbl tr:active td{background:#0d1520}
.badge{display:inline-block;padding:2px 10px;border-radius:999px;font-size:.7rem;font-weight:700}
.sec-title{font-family:'Playfair Display',serif;font-size:1.3rem;color:#e2e8f0;margin:0 0 1.2rem}
.form-label{display:block;font-size:.75rem;color:#94a3b8;margin-bottom:5px;font-weight:600;text-transform:uppercase;letter-spacing:.05em}
.form-inp{width:100%;padding:10px 14px;background:#0a0f1a;border:1.5px solid #243048;border-radius:10px;color:#e2e8f0;font-size:.9rem;font-family:inherit;margin-bottom:1rem}
.form-inp:disabled{opacity:.5}
.modal-bg{position:fixed;inset:0;background:rgba(0,0,0,.78);z-index:999;display:flex;align-items:flex-end;justify-content:center}
.modal-box{background:#111827;border:1.5px solid #1e2d45;border-radius:20px 20px 0 0;width:100%;max-height:92vh;overflow-y:auto;padding:1.5rem}
.modal-title{font-family:'Playfair Display',serif;font-size:1rem;color:#e2e8f0;margin-bottom:1.25rem;display:flex;align-items:center;justify-content:space-between}
.nav-btn{display:flex;align-items:center;gap:10px;padding:9px 12px;border-radius:10px;border:none;width:100%;background:none;cursor:pointer;color:#64748b;font-size:.84rem;font-weight:500;text-align:left;transition:all .15s}
.nav-btn.active{color:#4ade80;font-weight:700;background:rgba(26,107,60,.2);border-left:3px solid #2ea05a}
.nav-btn:not(.active){border-left:3px solid transparent}
.nav-btn-admin.active{color:#fbbf24;background:rgba(180,83,9,.2);border-left:3px solid #d97706}
#bottom-nav{display:flex;background:#0a1018;border-top:1px solid #1e2d45;padding:4px 0 8px}
.bnav-btn{flex:1;display:flex;flex-direction:column;align-items:center;gap:3px;padding:6px 2px;border:none;background:none;cursor:pointer;color:#475569;font-size:.58rem;font-weight:600;text-transform:uppercase;letter-spacing:.04em}
.bnav-btn.active{color:#4ade80}
.bnav-btn-admin.active{color:#facc15}
#sidebar{display:none}
@media(min-width:640px){#sidebar{display:flex;flex-direction:column;width:220px;background:#0a1018;border-right:1px solid #1e2d45;flex-shrink:0}#bottom-nav{display:none}#main-wrap{flex-direction:row}}
#main-wrap{display:flex;flex:1;overflow:hidden}
#content{flex:1;overflow-y:auto;padding:1.25rem}
#topbar{height:56px;background:#0a1018;border-bottom:1px solid #1e2d45;display:flex;align-items:center;padding:0 1rem;gap:10px;flex-shrink:0}
.sync-bar{background:#1a6b3c22;border-bottom:2px solid #2ea05a;padding:6px 1rem;font-size:.75rem;color:#4ade80;display:flex;align-items:center;gap:8px;flex-shrink:0}
.sync-bar.offline{background:#f8717122;border-color:#f87171;color:#f87171}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
@keyframes shake{0%,100%{transform:translateX(0)}25%,75%{transform:translateX(-6px)}50%{transform:translateX(6px)}}
@keyframes spin{to{transform:rotate(360deg)}}
.fade{animation:fadeIn .25s ease}
.spin{animation:spin 1s linear infinite;display:inline-block}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:0 1rem}
</style>

async function fbGet(path) {
  const snap = await get(ref(db, path));
  return snap.exists() ? snap.val() : null;
}
async function fbSet(path, val) { await set(ref(db, path), val); }
async function fbUpdate(path, val) { await update(ref(db, path), val); }
async function fbRemove(path) { await remove(ref(db, path)); }
async function fbPush(path, val) { return await push(ref(db, path), val); }

function fbListen(path, cb) {
  return onValue(ref(db, path), snap => cb(snap.exists() ? snap.val() : {}));
}

const h = (tag,attrs,...children) => {
  const el = document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class") el.className=v;
    else if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false) return;
    el.append(typeof c==="string"||typeof c==="number"?document.createTextNode(String(c)):c);
  });
  return el;
};

const svg = (d,s=18) => {
  const el = document.createElementNS("http://www.w3.org/2000/svg","svg");
  el.setAttribute("width",s);el.setAttribute("height",s);
  el.setAttribute("viewBox","0 0 24 24");el.setAttribute("fill","none");
  el.setAttribute("stroke","currentColor");el.setAttribute("stroke-width","1.8");
  el.setAttribute("stroke-linecap","round");el.setAttribute("stroke-linejoin","round");
  (d||"").split(" M").filter(Boolean).forEach((seg,i)=>{
    const p=document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d",(i===0?"":"M")+seg);el.appendChild(p);
  });
  return el;
};
