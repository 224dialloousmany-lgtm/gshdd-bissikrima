// ══════════════════════════════════════════
// HELPERS
// ══════════════════════════════════════════
const h = (tag,attrs,...children) => {
  const el = document.createElement(tag);
  if(attrs) Object.entries(attrs).forEach(([k,v])=>{
    if(k==="class") el.className=v;
    else if(k==="style"&&typeof v==="object") Object.assign(el.style,v);
    else if(k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(),v);
    else el.setAttribute(k,v);
  });
  children.flat(Infinity).forEach(c=>{
    if(c==null||c===false) return;
    el.append(typeof c==="string"||typeof c==="number" ? document.createTextNode(String(c)) : c);
  });
  return el;
};

const svg = (paths, s=18) => {
  const el = document.createElementNS("http://www.w3.org/2000/svg","svg");
  el.setAttribute("width",s); el.setAttribute("height",s);
  el.setAttribute("viewBox","0 0 24 24"); el.setAttribute("fill","none");
  el.setAttribute("stroke","currentColor"); el.setAttribute("stroke-width","1.8");
  el.setAttribute("stroke-linecap","round"); el.setAttribute("stroke-linejoin","round");
  paths.split(" M").filter(Boolean).forEach((seg,i)=>{
    const p = document.createElementNS("http://www.w3.org/2000/svg","path");
    p.setAttribute("d",(i===0?"":"M")+seg); el.appendChild(p);
  });
  return el;
};

const ICONS = {

  eye:    "M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z M12 9a3 3 0 100 6 3 3 0 000-6z",

  menu:   "M3 12h18 M3 6h18 M3 18h18",
};

const icon = (n,s) => svg(ICONS[n]||"M0 0",s);

const badge = (t,c="gray") => {
  const cols = {
    green:["rgba(34,197,94,.15)","#4ade80"], red:["rgba(239,68,68,.15)","#f87171"],
    orange:["rgba(251,146,60,.15)","#fb923c"], blue:["rgba(6,182,212,.15)","#22d3ee"],
    gray:["rgba(100,116,139,.15)","#94a3b8"], gold:["rgba(234,179,8,.15)","#facc15"]
  };
  const [bg,fg] = cols[c]||cols.gray;
  const el = h("span",{class:"badge",style:{background:bg,color:fg}},t);
  return el;
};

const btn = (label,variant,onClick,extra={}) => {
  const cl = `btn btn-${variant} ${extra.full?"btn-full":""}`;
  const el = h("button",{class:cl,onclick:onClick},
    extra.icon?icon(extra.icon,14):"", label);
  if(extra.style) Object.assign(el.style, extra.style);
  return el;
};

const inp = (label, val, onChange, opts={}) => {
  const wrap = h("div",{style:{marginBottom:"1rem"}});
  if(label) wrap.appendChild(h("label",{class:"form-label"},label, opts.req?h("span",{style:{color:"#f87171"}}," *"):""));
  let el;
  if(opts.opts) {
    el = h("select",{class:"form-inp",disabled:opts.disabled?"true":null});
    el.appendChild(h("option",{value:""},"— Choisir —"));
    opts.opts.forEach(o=>{ const op=h("option",{value:o},o); if(o===val) op.selected=true; el.appendChild(op); });
    if(!opts.opts.includes(val)&&val) { const op=h("option",{value:val},val); op.selected=true; el.appendChild(op); }
  } else {
    el = h("input",{class:"form-inp",type:opts.type||"text",value:val||"",placeholder:opts.placeholder||"",disabled:opts.disabled?"true":null});
  }
  el.addEventListener("input", e => onChange(e.target.value));
  el.addEventListener("change", e => onChange(e.target.value));
  wrap.appendChild(el);
  return wrap;
};

function render() {

// ══════════════════════════════════════════
// LOGIN
// ══════════════════════════════════════════
function renderLogin() {
  let loginId="", loginPw="", showPw=false, err="";

  const wrap = h("div",{style:{minHeight:"100vh",background:"linear-gradient(135deg,#060b14 0%,#0d1a0f 100%)",display:"flex",flexDirection:"column",alignItems:"center",justifyContent:"center",padding:"1.5rem"}});

  logoBox.innerHTML = `<svg width="34" height="34" fill="none" stroke="white" stroke-width="1.8" viewBox="0 0 24 24"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2z"/><path d="M9 22V12h6v10"/></svg>`;
  logoWrap.appendChild(logoBox);
  logoWrap.appendChild(h("h1",{style:{fontFamily:"'Playfair Display',serif",fontSize:"1.3rem",color:"#e2e8f0",marginBottom:"4px",lineHeight:"1.3"}},SCHOOL));
  logoWrap.appendChild(h("p",{style:{color:"#2ea05a",fontSize:".82rem",fontWeight:"600",letterSpacing:".08em",textTransform:"uppercase"}},VILLE+" — Espace Numérique"));
  wrap.appendChild(logoWrap);

  const card = h("div",{class:"card",style:{width:"100%",maxWidth:"380px"}});
  card.appendChild(h("h2",{style:{fontFamily:"'Playfair Display',serif",fontSize:"1.1rem",color:"#e2e8f0",marginBottom:"1.5rem",textAlign:"center"}},"Connexion"));

  const idWrap = h("div",{style:{marginBottom:"1rem"}});
  idWrap.appendChild(h("label",{class:"form-label"},"Identifiant"));
  const idInp = h("input",{class:"form-inp",type:"text",placeholder:"ex: admin, t1, t2 ...",style:{marginBottom:0}});
  idInp.addEventListener("input",e=>{loginId=e.target.value});
  idWrap.appendChild(idInp);
  card.appendChild(idWrap);

  const pwWrap = h("div",{style:{marginBottom:"1rem",position:"relative"}});
  pwWrap.appendChild(h("label",{class:"form-label"},"Mot de passe"));
  const pwInp = h("input",{class:"form-inp",type:"password",placeholder:"••••••••",style:{marginBottom:0,paddingRight:"44px"}});
  pwInp.addEventListener("input",e=>{loginPw=e.target.value});
  pwInp.addEventListener("keydown",e=>{if(e.key==="Enter") doLogin()});
  const eyeBtn = h("button",{style:{position:"absolute",right:"10px",top:"34px",background:"none",border:"none",color:"#64748b",cursor:"pointer"},onclick:()=>{
    showPw=!showPw; pwInp.type=showPw?"text":"password";
  }});
  eyeBtn.appendChild(icon("eye",16));
  pwWrap.appendChild(pwInp); pwWrap.appendChild(eyeBtn);
  card.appendChild(pwWrap);

  const errDiv = h("div",{style:{display:"none",background:"rgba(239,68,68,.1)",border:"1px solid rgba(239,68,68,.25)",borderRadius:"8px",padding:"8px 12px",fontSize:".82rem",color:"#f87171",marginBottom:"1rem"}});
  card.appendChild(errDiv);

  const loginBtn = h("button",{class:"btn btn-primary btn-full",style:{padding:"12px"},onclick:doLogin});
  loginBtn.appendChild(icon("lock",15));
  loginBtn.append(" Se connecter");
  card.appendChild(loginBtn);

  // Aide
  const help = h("div",{style:{marginTop:"1.25rem",padding:"1rem",background:"#0a0f1a",borderRadius:"10px",border:"1px solid #1e2d45"}});
  help.appendChild(h("p",{style:{fontSize:".72rem",color:"#64748b",marginBottom:"6px",fontWeight:"600",textTransform:"uppercase"}},"Comptes disponibles"));
  const demos = [
    ["🔑 Directeur","admin","admin2024","#facc15"],
    ["👨‍🏫 Prof CP","t1","cp2024","#4ade80"],
    ["👨‍🏫 Prof CE1","t2","ce12024","#4ade80"],
    ["👨‍🏫 Prof 6ème","t3","6eme2024","#4ade80"],
  ];
  demos.forEach(([label,id,pw,c])=>{
    const row = h("div",{style:{fontSize:".72rem",color:"#94a3b8",marginBottom:"3px",cursor:"pointer",userSelect:"none"}});
    row.innerHTML = `${label} : <b style="color:${c}">${id}</b> / <b style="color:${c}">${pw}</b>`;
    row.addEventListener("click",()=>{ idInp.value=id; pwInp.value=pw; loginId=id; loginPw=pw; });
    help.appendChild(row);
  });
  help.appendChild(h("p",{style:{fontSize:".68rem",color:"#334155",marginTop:"6px"}},"(Appuyez sur un compte pour le sélectionner)"));
  card.appendChild(help);
  wrap.appendChild(card);

  function doLogin(){
    const all = [ADMIN, ...STATE.teachers];
    const u = all.find(u=>u.id===loginId.trim()&&u.password===loginPw.trim());
    if(u){ STATE.user=u; STATE.page="dashboard"; STATE.classFilt=u.classe||""; render(); }
    else {
      errDiv.style.display="block";
      errDiv.textContent="Identifiant ou mot de passe incorrect.";
      card.classList.add("shake");
      setTimeout(()=>card.classList.remove("shake"),400);
    }
  }

  return wrap;
}

    const row=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between"}});

  grid.appendChild(tile("Élèves",myEleves.length,"hat","#2ea05a"));

  grid.appendChild(tile("Absents",abs,"x","#f87171"));

  // Barre présence
  const bar = h("div",{class:"card",style:{marginBottom:"1.25rem"}});
  const barTop = h("div",{style:{display:"flex",justifyContent:"space-between",marginBottom:"8px"}});
  barTop.appendChild(h("span",{style:{fontSize:".8rem",color:"#94a3b8"}},"Taux de présence aujourd'hui"));

    const chips = h("div",{style:{display:"flex",flexWrap:"wrap",gap:"8px"}});

    });

  }
  return wrap;
}

function renderNotes(myEleves,isAdmin){
  const wrap=h("div",{});
  let classFilt=STATE.classFilt||"";

  const topRow=h("div",{style:{display:"flex",alignItems:"center",justifyContent:"space-between",flexWrap:"wrap",gap:"10px",marginBottom:"1.25rem"}});
  topRow.appendChild(h("h2",{class:"sec-title",style:{margin:"0"}},"Notes & Évaluations"));

    const sel=h("select",{class:"form-inp",style:{marginBottom:"0",width:"auto"}});
    const op0=h("option",{value:""},"Toutes classes"); sel.appendChild(op0);
    CLASSES.forEach(c=>{const op=h("option",{value:c},c);if(c===classFilt)op.selected=true;sel.appendChild(op);});
    sel.addEventListener("change",e=>{STATE.classFilt=e.target.value;render();});
    topRow.appendChild(sel);
  }
  wrap.appendChild(topRow);

  const getMoy=e=>{const v=Object.values(e.notes||{});return v.length?(v.reduce((a,b)=>a+b,0)/v.length).toFixed(1):"—";};
  const getMention=m=>{const v=parseFloat(m);if(isNaN(v))return"";return v>=16?"Très Bien":v>=14?"Bien":v>=12?"Assez Bien":v>=10?"Passable":"Insuffisant";};
  const cf=STATE.classFilt;
  const displayed=cf?myEleves.filter(e=>e.classe===cf):myEleves;

  const card=h("div",{class:"card",style:{padding:"0",overflow:"hidden"}});
  const tbl=h("table",{class:"tbl"});
  const thead=h("thead",{}); const tr0=h("tr",{});
  ["Élève","Classe","Moyenne","Mention","Notes"].forEach(t=>tr0.appendChild(h("th",{},t)));
  thead.appendChild(tr0); tbl.appendChild(thead);
  const tbody=h("tbody",{});
  displayed.forEach(e=>{
    const moy=getMoy(e); const mention=getMention(moy);
    const tr=h("tr",{style:{cursor:"pointer"},onclick:()=>{
      STATE.modal={type:"notes",data:{...e}};render();
    }});
    tr.appendChild(h("td",{style:{fontWeight:"600",color:"#e2e8f0"}},e.prenom+" "+e.nom));
    tr.appendChild(h("td",{},badge(e.classe,"blue")));
    tr.appendChild(h("td",{},h("span",{style:{fontWeight:"700",color:parseFloat(moy)>=10?"#4ade80":"#f87171"}},moy+"/20")));
    tr.appendChild(h("td",{style:{fontSize:".78rem",color:"#94a3b8"}},mention));
    const nb=h("button",{class:"btn btn-ghost",style:{padding:"4px 10px",fontSize:".75rem"}},icon("edit",12)," Éditer");
    tr.appendChild(h("td",{},nb));
    tbody.appendChild(tr);
  });
  tbl.appendChild(tbody); card.appendChild(tbl); wrap.appendChild(card);
  return wrap;
}

// STATS
// ══════════════════════════════════════════
function renderStats(){
  const wrap=h("div",{});
  wrap.appendChild(h("h2",{class:"sec-title"},"Statistiques générales"));
  const pres=STATE.eleves.filter(e=>e.statut==="Présent").length;
  const max=Math.max(...CLASSES.map(cl=>STATE.eleves.filter(e=>e.classe===cl).length),1);

  const grid=h("div",{style:{display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1rem",marginBottom:"1rem"}});

  // Effectif par classe
  const ec=h("div",{class:"card"});
  ec.appendChild(h("div",{style:{fontSize:".72rem",fontWeight:"700",color:"#64748b",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"1rem"}},"Effectif par classe"));
  CLASSES.forEach(cl=>{
    const n=STATE.eleves.filter(e=>e.classe===cl).length;
    if(!n) return;
    const row=h("div",{style:{display:"flex",alignItems:"center",gap:"8px",marginBottom:"6px"}});
    row.appendChild(h("div",{style:{width:"75px",fontSize:".68rem",color:"#64748b",textAlign:"right",flexShrink:"0"}},cl));
    const track=h("div",{style:{flex:"1",height:"18px",background:"#0a0f1a",borderRadius:"3px",overflow:"hidden"}});
    const fill=h("div",{style:{height:"100%",width:(n/max*100)+"%",background:"linear-gradient(90deg,#1a6b3c,#2ea05a)",display:"flex",alignItems:"center",paddingLeft:"5px"}});
    fill.appendChild(h("span",{style:{fontSize:".65rem",fontWeight:"700",color:"#fff"}},String(n)));
    track.appendChild(fill); row.appendChild(track); ec.appendChild(row);
  });
  grid.appendChild(ec);

  // Présences
  const pc=h("div",{class:"card"});
  pc.appendChild(h("div",{style:{fontSize:".72rem",fontWeight:"700",color:"#64748b",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"1rem"}},"Présences globales"));
  const row3=h("div",{style:{display:"flex",justifyContent:"space-around",marginBottom:"1.25rem"}});
  [{l:"Présents",v:pres,c:"#4ade80"},{l:"Absents",v:STATE.eleves.length-pres,c:"#f87171"},{l:"Total",v:STATE.eleves.length,c:"#94a3b8"}].forEach(item=>{
    const col=h("div",{style:{textAlign:"center"}});
    col.appendChild(h("div",{style:{fontSize:"1.7rem",fontWeight:"700",color:item.c,fontFamily:"'Playfair Display',serif"}},String(item.v)));
    col.appendChild(h("div",{style:{fontSize:".7rem",color:"#475569"}},item.l));
    row3.appendChild(col);
  });
  pc.appendChild(row3);
  const pct=Math.round(STATE.eleves.length?pres/STATE.eleves.length*100:0);
  const track=h("div",{style:{height:"10px",background:"#0a0f1a",borderRadius:"5px",overflow:"hidden",display:"flex"}});
  track.appendChild(h("div",{style:{width:pct+"%",background:"#1a6b3c"}}));
  track.appendChild(h("div",{style:{flex:"1",background:"#7f1d1d",opacity:".5"}}));
  pc.appendChild(track);
  pc.appendChild(h("div",{style:{fontSize:".75rem",color:"#2ea05a",marginTop:"8px",fontWeight:"700"}},pct+"% de présence"));
  grid.appendChild(pc);
  wrap.appendChild(grid);

  // Enseignants
  const tcard=h("div",{class:"card"});
  tcard.appendChild(h("div",{style:{fontSize:".72rem",fontWeight:"700",color:"#64748b",textTransform:"uppercase",letterSpacing:".06em",marginBottom:"1rem"}},"Enseignants & Classes"));
  const tg=h("div",{style:{display:"grid",gridTemplateColumns:"repeat(auto-fill,minmax(180px,1fr))",gap:"8px"}});
  STATE.teachers.forEach(t=>{
    const tc=h("div",{style:{background:"#0a0f1a",border:"1px solid #1e2d45",borderRadius:"10px",padding:"10px 12px",display:"flex",alignItems:"center",gap:"10px"}});
    const av=h("div",{style:{width:"34px",height:"34px",borderRadius:"50%",background:"linear-gradient(135deg,#1a6b3c,#2ea05a)",display:"flex",alignItems:"center",justifyContent:"center",fontWeight:"700",fontSize:".82rem",flexShrink:"0",color:"#fff"}},(t.prenom?.[0]||t.nom?.[0]||"?").toUpperCase());
    tc.appendChild(av);
    const info=h("div",{});
    info.appendChild(h("div",{style:{fontSize:".82rem",fontWeight:"600",color:"#e2e8f0"}},t.prenom+" "+t.nom));
    info.appendChild(h("div",{style:{fontSize:".7rem",color:"#2ea05a",fontWeight:"600"}},t.classe+" — "+STATE.eleves.filter(e=>e.classe===t.classe).length+" élèves"));
    tc.appendChild(info); tg.appendChild(tc);
  });
  tcard.appendChild(tg); wrap.appendChild(tcard);
  return wrap;
}

// ══════════════════════════════════════════
// MODALES
// ══════════════════════════════════════════
function renderModal(){
  const {type,data,editId} = STATE.modal;
  const close=()=>{STATE.modal=null;render();};
  const bg=h("div",{class:"modal-bg",onclick:e=>{if(e.target===bg)close();}});
  const box=h("div",{class:"modal-box"});
  bg.appendChild(box);

  if(type==="teacher"){
    const isEdit=!!data.id&&STATE.teachers.find(t=>t.id===data.id);
    const title=h("div",{class:"modal-title"},isEdit?"Modifier l'enseignant":"Nouvel enseignant");
    const xb=h("button",{style:{background:"none",border:"none",color:"#64748b",cursor:"pointer"},onclick:close}); xb.appendChild(icon("x")); title.appendChild(xb);
    box.appendChild(title);

    const grid=h("div",{class:"grid2"});
    let nom=data.nom,prenom=data.prenom,classe=data.classe,password=data.password,lid=data.id;

    const nomW=inp("Nom",nom,v=>{nom=v},{req:true}); grid.appendChild(nomW);
    const prenomW=inp("Prénom",prenom,v=>{prenom=v}); grid.appendChild(prenomW);
    box.appendChild(grid);
    box.appendChild(inp("Classe assignée",classe,v=>{classe=v},{opts:CLASSES,req:true}));
    const grid2=h("div",{class:"grid2"});
    grid2.appendChild(inp("Identifiant (login)",lid,v=>{lid=v},{placeholder:"ex: t5",disabled:isEdit}));
    grid2.appendChild(inp("Mot de passe",password,v=>{password=v},{req:true}));
    box.appendChild(grid2);

    const row=h("div",{style:{display:"flex",justifyContent:"flex-end",gap:"8px",marginTop:"8px"}});
    const cb=h("button",{class:"btn btn-ghost",onclick:close},"Annuler"); row.appendChild(cb);
    const sb=h("button",{class:"btn btn-primary",onclick:()=>{
      if(!nom||!classe||!password) return;
      const t={id:lid||(isEdit?data.id:"t"+Date.now()),nom,prenom,classe,password,role:"teacher"};
      if(isEdit) STATE.teachers=STATE.teachers.map(x=>x.id===data.id?t:x);
      else STATE.teachers=[...STATE.teachers,t];
      save(); close();
    }}); sb.appendChild(icon("check",14)); sb.append(" Enregistrer");
    row.appendChild(sb); box.appendChild(row);
  }

  else if(type==="eleve"){
    const isEdit=!!data.id&&STATE.eleves.find(e=>e.id===data.id);
    const myClass=STATE.user.classe;
    const isAdmin=STATE.user.role==="admin";
    const title=h("div",{class:"modal-title"},isEdit?"Modifier l'élève":"Nouvel élève");
    const xb=h("button",{style:{background:"none",border:"none",color:"#64748b",cursor:"pointer"},onclick:close}); xb.appendChild(icon("x")); title.appendChild(xb);
    box.appendChild(title);

    let nom=data.nom,prenom=data.prenom,classe=data.classe||myClass||"",dn=data.dateNaissance||"",parent=data.parent||"",tel=data.telephone||"";
    const grid=h("div",{class:"grid2"});
    grid.appendChild(inp("Nom",nom,v=>{nom=v},{req:true}));
    grid.appendChild(inp("Prénom",prenom,v=>{prenom=v},{req:true}));
    box.appendChild(grid);
    box.appendChild(inp("Classe",classe,v=>{classe=v},{opts:isAdmin?CLASSES:[myClass],disabled:!isAdmin,req:true}));
    box.appendChild(inp("Date de naissance",dn,v=>{dn=v},{type:"date"}));
    box.appendChild(inp("Nom du parent / tuteur",parent,v=>{parent=v}));
    box.appendChild(inp("Téléphone parent",tel,v=>{tel=v}));

    const row=h("div",{style:{display:"flex",justifyContent:"flex-end",gap:"8px",marginTop:"8px"}});
    const cb=h("button",{class:"btn btn-ghost",onclick:close},"Annuler"); row.appendChild(cb);
    const sb=h("button",{class:"btn btn-primary",onclick:()=>{
      if(!nom||!prenom||!classe) return;
      const eleve={...data,nom,prenom,classe,dateNaissance:dn,parent,telephone:tel,id:data.id||("e"+Date.now()),notes:data.notes||{},statut:data.statut||"Présent"};
      if(isEdit) STATE.eleves=STATE.eleves.map(x=>x.id===data.id?eleve:x);
      else STATE.eleves=[...STATE.eleves,eleve];
      save(); close();
    }}); sb.appendChild(icon("check",14)); sb.append(" Enregistrer");
    row.appendChild(sb); box.appendChild(row);
  }

  else if(type==="notes"){
    const e=data;
    const title=h("div",{class:"modal-title"},e.prenom+" "+e.nom+" — "+e.classe);
    const xb=h("button",{style:{background:"none",border:"none",color:"#64748b",cursor:"pointer"},onclick:close}); xb.appendChild(icon("x")); title.appendChild(xb);
    box.appendChild(title);

    const tbl=h("table",{class:"tbl"});
    const thead=h("thead",{}); const tr0=h("tr",{});
    ["Matière","Note /20"].forEach(t=>tr0.appendChild(h("th",{},t)));
    thead.appendChild(tr0); tbl.appendChild(thead);
    const tbody=h("tbody",{});
    MATIERES.forEach(m=>{
      const tr=h("tr",{});
      tr.appendChild(h("td",{style:{color:"#cbd5e1"}},m));
      const cur=STATE.eleves.find(x=>x.id===e.id);
      const val=cur?.notes?.[m]??"";
      const ni=h("input",{type:"number",min:"0",max:"20",step:"0.5",value:String(val),style:{width:"65px",padding:"6px 8px",background:"#0a0f1a",border:"1.5px solid #1e2d45",borderRadius:"7px",color:"#e2e8f0",fontSize:".86rem",fontFamily:"inherit"}});
      ni.addEventListener("input",ev=>{
        const v=parseFloat(ev.target.value)||0;
        STATE.eleves=STATE.eleves.map(x=>x.id===e.id?{...x,notes:{...x.notes,[m]:v}}:x);
        save(); updateMoy();
      });
      tr.appendChild(h("td",{},ni)); tbody.appendChild(tr);
    });
    tbl.appendChild(tbody); box.appendChild(tbl);

    const moyDiv=h("div",{style:{marginTop:"1rem",padding:"10px",background:"#0a0f1a",borderRadius:"10px",textAlign:"center"}});
    box.appendChild(moyDiv);
    function updateMoy(){
      const cur=STATE.eleves.find(x=>x.id===e.id);
      const vals=Object.values(cur?.notes||{});
      const moy=vals.length?(vals.reduce((a,b)=>a+b,0)/vals.length).toFixed(1):"—";
      const mention=parseFloat(moy)>=16?"Très Bien":parseFloat(moy)>=14?"Bien":parseFloat(moy)>=12?"Assez Bien":parseFloat(moy)>=10?"Passable":"Insuffisant";
      moyDiv.innerHTML=`<span style="color:#64748b;font-size:.8rem">Moyenne : </span><span style="font-weight:700;font-size:1.1rem;color:#4ade80">${moy}/20</span><span style="color:#64748b;font-size:.8rem;margin-left:8px">— ${mention}</span>`;
    }
    updateMoy();

    const rb=h("button",{class:"btn btn-primary",style:{marginTop:"1rem",width:"100%",justifyContent:"center"},onclick:close},"Fermer");
    box.appendChild(rb);
  }

  else if(type==="document"){
    const myEleves=STATE.user.role==="admin"?STATE.eleves:STATE.eleves.filter(e=>e.classe===STATE.user.classe);
    let selEleve=data.selEleve||"",generated=data.generated||"";
    const docTypes={attestation:"Attestation de scolarité",bulletin:"Bulletin de notes",liste:"Liste de classe",convocation:"Convocation parents"};
    const title=h("div",{class:"modal-title"},docTypes[data.docType]||"Document");
    const xb=h("button",{style:{background:"none",border:"none",color:"#64748b",cursor:"pointer"},onclick:close}); xb.appendChild(icon("x")); title.appendChild(xb);
    box.appendChild(title);

    if(["attestation","bulletin","convocation"].includes(data.docType)){
      box.appendChild(h("label",{class:"form-label"},"Sélectionner l'élève"));
      const sel=h("select",{class:"form-inp"});
      sel.appendChild(h("option",{value:""},"— Choisir un élève —"));
      myEleves.forEach(e=>{const op=h("option",{value:e.id},e.prenom+" "+e.nom+" ("+e.classe+")");sel.appendChild(op);});
      sel.addEventListener("change",ev=>{selEleve=ev.target.value;});
      box.appendChild(sel);
    }

    const genBtn=h("button",{class:"btn btn-primary btn-full",style:{marginBottom:"1rem"},onclick:()=>{
      const today=new Date().toLocaleDateString("fr-FR");
      const header=`════════════════════════════════\n${SCHOOL}\n${VILLE}\n════════════════════════════════`;
      let out="";
      if(data.docType==="attestation"){
        const e=myEleves.find(x=>x.id===selEleve);
        if(!e){out="⚠ Veuillez sélectionner un élève.";}
        else out=`${header}\n\nATTESTATION DE SCOLARITÉ\n\nNous soussignés, le Directeur du\n${SCHOOL} de ${VILLE},\ncertifions que :\n\nNom & Prénom : ${e.prenom} ${e.nom}\nNé(e) le     : ${e.dateNaissance||"—"}\nClasse       : ${e.classe}\n\nEst régulièrement inscrit(e) dans\nnotre établissement pour l'année\nscolaire en cours.\n\nDélivré pour servir et valoir\nce que de droit.\n\nFait à ${VILLE}, le ${today}\n\n      LE DIRECTEUR\n      _______________`;
      } else if(data.docType==="bulletin"){
        const e=myEleves.find(x=>x.id===selEleve);
        if(!e){out="⚠ Veuillez sélectionner un élève.";}
        else{
          const notes=Object.entries(e.notes||{});
          const moy=notes.length?(notes.reduce((a,[,v])=>a+v,0)/notes.length).toFixed(2):"—";
          const mention=parseFloat(moy)>=16?"Très Bien":parseFloat(moy)>=14?"Bien":parseFloat(moy)>=12?"Assez Bien":parseFloat(moy)>=10?"Passable":"Insuffisant";
          out=`${header}\n\nBULLETIN DE NOTES\n\nÉlève  : ${e.prenom} ${e.nom}\nClasse : ${e.classe}\n\n${"─".repeat(32)}\nMATIÈRE            NOTE/20\n${"─".repeat(32)}\n${notes.map(([m,n])=>m.substring(0,17).padEnd(18)+n).join("\n")||"Aucune note"}\n${"─".repeat(32)}\nMoyenne   : ${moy}/20\nMention   : ${mention}\n${"─".repeat(32)}\n\nFait à ${VILLE}, le ${today}`;
        }
      } else if(data.docType==="liste"){
        const classes=[...new Set(myEleves.map(e=>e.classe))];
        out=`${header}\n\nLISTE DES ÉLÈVES\n\n`+classes.map(cl=>{
          const ee=myEleves.filter(x=>x.classe===cl);
          return`── ${cl} (${ee.length} élève${ee.length>1?"s":""}) ──\n${ee.map((x,i)=>`  ${String(i+1).padStart(2,"0")}. ${x.prenom} ${x.nom}`).join("\n")}`;
        }).join("\n\n");
      } else {
        out=`${header}\n\nDocument généré le ${today}.`;
      }
      generated=out;
      genOut.textContent=generated;
      genOut.style.display="block";
    }});
    genBtn.appendChild(icon("doc",14)); genBtn.append(" Générer");
    box.appendChild(genBtn);

    const genOut=h("pre",{style:{background:"#0a0f1a",border:"1px solid #1e2d45",borderRadius:"10px",padding:"1rem",fontFamily:"monospace",fontSize:".74rem",color:"#94a3b8",whiteSpace:"pre-wrap",lineHeight:"1.8",maxHeight:"320px",overflow:"auto",display:generated?"block":"none"}},generated);
    box.appendChild(genOut);
  }

  return bg;
}

// ══════════════════════════════════════════
// PWA SERVICE WORKER
// ══════════════════════════════════════════
if("serviceWorker" in navigator){
  const SW_CODE = `
    const CACHE = "gshdd-v1";
    const FILES = [location.href];
    self.addEventListener("install", e => e.waitUntil(caches.open(CACHE).then(c => c.addAll(FILES))));
    self.addEventListener("fetch", e => e.respondWith(caches.match(e.request).then(r => r || fetch(e.request).then(res => {
      const clone = res.clone();
      caches.open(CACHE).then(c => c.put(e.request, clone));
      return res;
    }))));
    self.addEventListener("activate", e => e.waitUntil(caches.keys().then(keys => Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k))))));
  `;
  const blob = new Blob([SW_CODE], {type:"application/javascript"});
  const swUrl = URL.createObjectURL(blob);
  navigator.serviceWorker.register(swUrl).catch(()=>{});
}
